name: Anchor

options:
  minimumXcodeGenVersion: 2.45.4
  deploymentTarget:
    iOS: "26.5"
    macOS: "26.5"
    visionOS: "26.5"

packages:
  AnchorCoreBindings:
    path: ../AnchorCoreBindings

targets:
  Anchor:
    type: application
    platform: auto
    supportedDestinations:
      - iOS
      - macOS
      - visionOS
    sources:
      - path: Anchor
    dependencies:
      - package: AnchorCoreBindings
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    preBuildScripts:
      - name: Build anchor-core FFI
        basedOnDependencyAnalysis: false
        script: |
          if [[ "$PLATFORM_NAME" == "macosx" ]]; then
            "$SRCROOT/Scripts/build-anchor-core-ffi.sh"
          else
            echo "Skipping anchor-core FFI build for $PLATFORM_NAME"
          fi
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_PREVIEWS: YES
        ENABLE_USER_SELECTED_FILES: readonly
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        MARKETING_VERSION: 1.0
        PRODUCT_BUNDLE_IDENTIFIER: dev.plimeor.Anchor
        PRODUCT_NAME: "$(TARGET_NAME)"
        REGISTER_APP_GROUPS: YES
        SDKROOT: auto
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2,7"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG $(inherited)
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          ENABLE_TESTABILITY: YES
        Release:
          SWIFT_COMPILATION_MODE: wholemodule

  AnchorUnitTests:
    type: bundle.unit-test
    platform: auto
    supportedDestinations:
      - iOS
      - macOS
      - visionOS
    sources:
      - path: AnchorUnitTests
    dependencies:
      - target: Anchor
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 5.0
        # macOS app executable lives at Anchor.app/Contents/MacOS/Anchor, not
        # the iOS-style Anchor.app/Anchor that XcodeGen defaults to.
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Anchor.app/Contents/MacOS/Anchor
        BUNDLE_LOADER: $(TEST_HOST)

  AnchorUITests:
    type: bundle.ui-testing
    platform: auto
    supportedDestinations:
      - iOS
      - macOS
      - visionOS
    sources:
      - path: AnchorUITests
    dependencies:
      - target: Anchor
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 5.0
        TEST_TARGET_NAME: Anchor

schemes:
  Anchor:
    build:
      targets:
        Anchor: all
    test:
      gatherCoverageData: true
      targets:
        - AnchorUnitTests
        - AnchorUITests
