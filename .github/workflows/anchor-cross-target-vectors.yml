name: Anchor Cross-Target Vectors

on:
  pull_request:
    paths:
      - '.github/workflows/anchor-cross-target-vectors.yml'
      - 'suites/anchor/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/anchor-cross-target-vectors.yml'
      - 'suites/anchor/**'

permissions:
  contents: read

jobs:
  native-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Rust targets
        run: rustup target add wasm32-unknown-unknown

      - name: Run native and wasm vectors
        run: bash suites/anchor/core/tests/run-cross-target-vectors.sh
        env:
          ANCHOR_SKIP_IOS: '1'

  ios-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Rust targets
        run: rustup target add wasm32-unknown-unknown aarch64-apple-ios-sim

      - name: Boot first available iOS Simulator
        run: |
          simulator_id="$(
            xcrun simctl list devices available |
              sed -n 's/.*(\([0-9A-F-]\{8\}-[0-9A-F-]\{4\}-[0-9A-F-]\{4\}-[0-9A-F-]\{4\}-[0-9A-F-]\{12\}\)) (Shutdown).*/\1/p' |
              head -n 1
          )"
          if [[ -z "$simulator_id" ]]; then
            echo "No available shutdown iOS simulator found" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          xcrun simctl boot "$simulator_id"
          xcrun simctl bootstatus "$simulator_id" -b
          echo "ANCHOR_IOS_SIMULATOR_ID=$simulator_id" >> "$GITHUB_ENV"

      - name: Run native, wasm, and iOS Simulator vectors
        run: bash suites/anchor/core/tests/run-cross-target-vectors.sh
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

  android-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Rust targets
        run: rustup target add wasm32-unknown-unknown x86_64-linux-android

      - name: Enable KVM
        run: |
          if [[ -e /dev/kvm ]]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
          fi

      - name: Install Android emulator image
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/emulator" >> "$GITHUB_PATH"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH"
          echo "ANDROID_AVD_HOME=$RUNNER_TEMP/android-avd" >> "$GITHUB_ENV"
          export ANDROID_AVD_HOME="$RUNNER_TEMP/android-avd"
          mkdir -p "$ANDROID_AVD_HOME"
          yes | sdkmanager --licenses >/dev/null || true
          if [[ -z "${ANDROID_NDK_LATEST_HOME:-}" && ! -d "$ANDROID_HOME/ndk" ]]; then
            sdkmanager --install "ndk;27.2.12479018"
            echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          fi
          sdkmanager --install \
            "platform-tools" \
            "emulator" \
            "platforms;android-35" \
            "system-images;android-35;google_apis;x86_64"
          echo "no" | avdmanager create avd \
            --force \
            --name anchor-vector \
            --package "system-images;android-35;google_apis;x86_64"
          ls -la "$ANDROID_AVD_HOME"

      - name: Boot Android emulator
        run: |
          nohup "$ANDROID_HOME/emulator/emulator" \
            -avd anchor-vector \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -no-snapshot \
            -gpu swiftshader_indirect \
            >"$RUNNER_TEMP/android-emulator.log" 2>&1 &
          timeout 120 adb wait-for-device || {
            echo "adb wait-for-device timed out" >&2
            tail -n 200 "$RUNNER_TEMP/android-emulator.log" >&2 || true
            exit 1
          }
          timeout 300 bash -c 'until [[ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" == "1" ]]; do sleep 5; done' || {
            echo "Android emulator boot_completed timed out" >&2
            adb devices -l >&2 || true
            tail -n 200 "$RUNNER_TEMP/android-emulator.log" >&2 || true
            exit 1
          }
          adb shell input keyevent 82 || true

      - name: Run Android vectors
        run: bash suites/anchor/core/tests/run-cross-target-vectors.sh
        env:
          ANCHOR_SKIP_IOS: '1'
          ANCHOR_RUN_ANDROID: '1'
          ANCHOR_ANDROID_TARGET: x86_64-linux-android
          ANCHOR_ANDROID_API: '35'

  apple-binding-package:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin aarch64-apple-ios aarch64-apple-ios-sim

      - name: Build Apple binding release artifacts
        run: bash suites/anchor/apple/build-binding-release-artifacts.sh
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
          ANCHOR_APPLE_ARTIFACT_DIR: /tmp/anchor-apple-stage1/hosted-binding-artifacts
