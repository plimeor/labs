name: Imprint Visual Baselines

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  baselines:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install

      - name: Build Storybook
        run: bun run --filter @plimeor/imprint-react build-storybook

      - name: Update visual baselines
        run: bun run --filter @plimeor/imprint-react test:visual:update

      - name: Commit baselines
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add packages/imprint-react/visual/__screenshots__
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore(imprint-react): update visual baselines"
            git push origin HEAD:${{ github.ref_name }}
          fi
