name: Imprint CI

on:
  pull_request:
    paths:
      - 'packages/imprint-tokens/**'
      - 'packages/imprint-react/**'      - 'apps/imprint-docs/**'
      - '.github/workflows/imprint-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/imprint-tokens/**'
      - 'packages/imprint-react/**'      - 'apps/imprint-docs/**'
      - '.github/workflows/imprint-ci.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Biome
        run: bunx biome check packages/imprint-tokens packages/imprint-react apps/imprint-docs

      - name: Test imprint-react
        run: bun run --filter @plimeor/imprint-react test

      - name: Build Storybook
        run: bun run --filter imprint-docs build-storybook

  visual:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Storybook
        run: bun run --filter imprint-docs build-storybook

      - name: Visual regression
        run: bun run --filter imprint-docs test:visual
